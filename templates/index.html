<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">📝 FastAPI To-Do List</h2>
        
        <form action="/add" method="post" class="d-flex mb-4">
            <input type="text" name="title" class="form-control me-2" placeholder="새로운 할 일을 입력하세요" required>
            <button type="submit" class="btn btn-primary">추가</button>
        </form>

        <div class="card shadow-sm">
            <ul class="list-group list-group-flush">
                {% if not todo_list %}
                    <li class="list-group-item text-center text-muted py-4">등록된 할 일이 없습니다.</li>
                {% else %}
                    {% for todo in todo_list %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            {% if todo.completed %}
                                <del class="text-muted">{{ todo.title }}</del>
                            {% else %}
                                <span>{{ todo.title }}</span>
                            {% endif %}
                        </div>
                        <div>
                            <a href="/update/{{ todo.id }}" class="btn btn-sm {% if todo.completed %}btn-secondary{% else %}btn-success{% endif %}">
                                {% if todo.completed %}취소{% else %}완료{% endif %}
                            </a>
                            <a href="/delete/{{ todo.id }}" class="btn btn-sm btn-danger">삭제</a>
                        </div>
                    </li>
                    {% endfor %}
                {% endif %}
            </ul>
        </div>
    </div>
</body>
</html>
